name: alquranalkareem
description: Al-Quran Al-Kareem - Al-Heekmah Library.

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 5.0.0+0

environment:
  sdk: '>=3.9.2 <4.0.0'

dependencies:
  anim_search_bar: ^2.0.3
  animated_custom_dropdown: ^3.1.1
  animations: ^2.1.1
  another_xlider: ^3.0.2
  arabic_numbers: ^1.0.0
  awesome_notifications: ^0.10.1
  awesome_notifications_core: ^0.10.1
  background_fetch: ^1.5.0
  badges: ^3.1.2
  bot_toast: ^4.1.3
  connectivity_plus: ^7.0.0
  cupertino_icons: ^1.0.8
  desktop_window: ^0.4.2
  dio: ^5.9.1
  drift: ^2.30.1
  drift_flutter: ^0.2.8
  easy_image_viewer: ^1.5.1
  either_dart: ^1.0.0
  expansion_tile_card: ^3.0.0
  flex_color_picker: ^3.8.0
  flexible_sheet:
    git:
      ref: main
      url: https://github.com/alheekmahlib/flexible_sheet.git
  floating_menu_expendable: ^1.0.0
  flutter:
    sdk: flutter
  flutter_app_info: ^3.0.3
  flutter_cache_manager: ^3.4.1
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_rounded_progress_bar: ^0.3.2
  flutter_screenutil: ^5.9.3
  flutter_slider_drawer: ^3.0.2
  flutter_sliding_box: ^1.1.5
  flutter_staggered_animations: ^1.1.1
  flutter_svg: ^2.2.3
  flutter_timezone: ^5.0.1
  gap: ^3.0.1
  get: ^4.7.3
  get_it: ^9.2.0
  get_storage: 2.1.1
  glob: ^2.1.3
  group_button: ^5.3.4
  hijri_date: ^1.0.0
  home_widget: ^0.9.0
  html: ^0.15.6
  info_popup: ^4.3.2
  intl: ^0.20.2
  lottie: ^3.3.2
  mini_music_visualizer: ^1.1.4
  package_rename: ^1.10.1
  path: ^1.9.1
  path_provider: ^2.1.5
  quran_library:
    git:
      ref: dev
      url: https://github.com/alheekmahlib/quran_library.git
  rate_my_app: ^2.3.2
  read_more_less: ^1.0.1
  responsive_builder: ^0.7.1
  rxdart: ^0.28.0
  screenshot: ^3.0.0
  scrollable_positioned_list: ^0.3.8
  share_plus: ^12.0.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  square_percent_indicater: ^0.1.0
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  wakelock_plus: ^1.3.0

dev_dependencies:
  build_runner: ^2.4.15
  drift_dev: ^2.25.2
  flutter_test:
    sdk: flutter

flutter_native_splash:
  color: "#404C6E"
  color_dark: "#2d2d2d"
  image: assets/splash_icon512.png
  image_dark: assets/splash_icon512.png

  android_12:
    image: assets/splash_icon512.png
    icon_background_color: "#404C6E"
    image_dark: assets/splash_icon512.png
    icon_background_color_dark: "#2d2d2d"

package_rename_config:
  android:
    package_name: com.alheekmah.alquranalkareem.alquranalkareem

  ios:
    app_name: القرآن الكريم - مكتبة الحكمة
    package_name: com.alheekmah.alquranalkareem.alquranalkareem

    macos:
      app_name: القرآن الكريم مكتبة الحكمة
      package_name: com.alheekmah.alquranalkareem.alquranalkareem2

  # flutter_launcher_icons:
  #   android: "launcher_icon"
  #   ios: true
  #   image_path: "assets/app_icon.png"
  #   min_sdk_android: 21 # android min sdk min:16, default 21
  #   windows:
  #     generate: true
  #     image_path: "assets/app_icon.png"
  #     icon_size: 48 # min:48, max:256, default: 48
  #   macos:
  #     generate: true
  #     image_path: "assets/app_icon.png"
  flutter_lints: ^5.0.0

flutter_assets:
  # assets_path: assets/lottie/
  assets_path: assets/svg/
  output_path: lib/core/utils/constants/
  # filename: lottie_constants.dart
  filename: svg_constants.dart
  field_prefix: null
  class_name: SvgPath

flutter:

  generate: true
  uses-material-design: true

  assets:
    - assets/svg/
    - assets/icons/
    - assets/svg/surah_name/
    - assets/images/
    - assets/svg/hijri/
    - assets/svg/alwaqf/
    - assets/svg/home/
    - assets/svg/quran/
    - assets/svg/audio/
    - assets/json/
    - assets/lottie/
    - assets/locales/
    - assets/app_icon.png
    - assets/app_icon_mac.png
    - assets/json/azkar.json

  fonts:
    - family: uthmanic
      fonts:
        - asset: assets/fonts/UthmanTN1_Ver10.otf

    - family: uthmanic2
      fonts:
        - asset: assets/fonts/UthmanicHafs_V20.ttf

    - family: kufi
      fonts:
        - asset: assets/fonts/Kufam-Italic-VariableFont_wght.ttf
          style: italic
        - asset: assets/fonts/Kufam-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Kufam-Regular.ttf
          weight: 100

    - family: naskh
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-VariableFont_wght.ttf
    - family: ayahNumber
      fonts:
        - asset: assets/fonts/Uthmanic_NeoCOLORD-Regular.ttf

    - family: urdu
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu.ttf

    - family: bn
      fonts:
        - asset: assets/fonts/NotoSerifBengali.ttf

    - family: playpen
      fonts:
        - asset: assets/fonts/Playpen_Sans_Arabic/PlaypenSansArabic-ExtraLight.ttf
          weight: 100
        - asset: assets/fonts/Playpen_Sans_Arabic/PlaypenSansArabic-Light.ttf
          weight: 200
        - asset: assets/fonts/Playpen_Sans_Arabic/PlaypenSansArabic-Regular.ttf
          weight: 300
        - asset: assets/fonts/Playpen_Sans_Arabic/PlaypenSansArabic-Medium.ttf
          weight: 400
        - asset: assets/fonts/Playpen_Sans_Arabic/PlaypenSansArabic-Bold.ttf
          weight: 700
